<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>3x Oefenen</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      background: #dd3e54;
      background: -webkit-linear-gradient(to right, #6be585, #dd3e54);
      background: linear-gradient(to right, #6be585, #dd3e54);
      font-family: Arial, sans-serif;
    }

    .container {
      display: flex;
      gap: 20px;
      padding: 20px;
      flex-wrap: wrap;
      align-items: flex-start;
    }

    .widget-box {
      width: 370px;
      max-width: 100%;
      padding: 10px;
      border: 1px solid #eee;
      background: white;
      box-sizing: border-box;
    }

    .widget-box iframe {
      width: 100%;
      height: 350px;
      border: 0;
      display: block;
    }
  </style>
</head>

<body>
  <div class="container">

    <!-- Weerplaza -->
    <div class="widget-box">
      <iframe
        scrolling="no"
        src="https://www.weerplaza.nl/weerwidgets/locatie/13193/"
        title="Weerplaza Maastricht">
      </iframe>
    </div>

    <!-- Twitter (Twitframe) -->
    <div class="widget-box">
      <iframe
        src="https://twitframe.com/show?url=https://twitter.com/TwitterDev"
        scrolling="no">
      </iframe>
    </div>

  </div> <!-- ✅ THIS FIXES IT -->

</body>
</html>
